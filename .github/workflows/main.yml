name: Hourly Weather Snapshot

# 지정한 특정 시간에만 작업을 실행하도록 설정
on:
  schedule:
    # 한국시간(KST): 오전 7시, 9시, 11시, 오후 12시, 1시, 2시, 3시, 4시
    # 영국시간(UTC): 전날 22시, 당일 0시, 2시, 3시, 4시, 5시, 6시, 7시
    - cron: '0 0,2,3,4,5,6,7,22 * * *'
  workflow_dispatch:     # 폰이나 PC에서 수동으로 테스트하고 싶을 때 누르는 버튼 활성화

jobs:
  run-weather-bot:
    runs-on: ubuntu-latest
    
    # 깃허브의 노란색 버전 경고창을 잠재우는 설정
    env: 
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1. 저장소의 코드를 가상 서버로 가져옴
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    # 2. 파이썬 환경 세팅
    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 필요한 라이브러리 설치 (이미지 처리, 웹 통신 등)
    - name: 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow

    # 4. 날씨 스냅샷 및 엑셀 기록 파이썬 코드 실행 (금고에서 API 키를 꺼내서 전달)
    - name: 스냅샷 스크립트 실행
      env:
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
      run: python weather_api.py

    # 5. 새로 생성된 이미지와 엑셀 파일을 GitHub 저장소에 자동 커밋 및 푸시
    - name: 결과물 GitHub에 자동 저장
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git commit -m "Auto-update: 현장 기상 스냅샷 및 엑셀 데이터 갱신" || echo "No changes to commit"
        git push
