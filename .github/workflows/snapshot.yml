name: 당일 체감온도 포스터 (09시·14시)

on:
  schedule:
    # 실황은 매시 40분 이후 제공되므로 45분에 실행 → 정시 실황 확보
    - cron: '45 0 * * *'   # 09:45 KST (09시 실황)
    - cron: '45 5 * * *'   # 14:45 KST (14시 실황)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-commit
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -fv
      - run: npm install canvas
      - name: 포스터 생성
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
          AREA_NO: '1120079000'
          POSTER_TYPE: 'daily'
        run: node scripts/generate-poster.js
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "📸 당일 스냅샷: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase --autostash || true
            git push
          fi
