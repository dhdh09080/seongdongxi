name: 체감온도 포스터 자동 스냅샷

on:
  schedule:
    # GitHub Actions는 UTC 기준입니다. 한국시간(KST) = UTC + 9시간
    # 09:00 KST = 00:00 UTC
    - cron: '0 0 * * *'
    # 14:00 KST = 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:   # 수동 실행 버튼 (테스트용)

# 생성한 이미지를 저장소에 커밋하기 위한 쓰기 권한
permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -fv

      - name: 의존성 설치
        run: npm install canvas

      - name: 포스터 생성
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
        run: node scripts/generate-poster.js

      - name: 생성된 포스터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --staged --quiet || git commit -m "자동 포스터 스냅샷: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
