name: 당일 체감온도 포스터 (09시·14시)

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 5 * * *'   # 14:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -fv
      - run: npm install canvas
      - name: 포스터 생성
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
          POSTER_TYPE: 'daily'
        run: node scripts/generate-poster.js
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --staged --quiet || git commit -m "📸 당일 스냅샷: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
