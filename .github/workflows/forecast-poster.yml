name: 예보 포스터 (18시)

on:
  schedule:
    - cron: '10 9 * * *'    # 18:10 KST (= 09:10 UTC) — 1차: 전날 저녁 예보
    - cron: '10 13 * * *'   # 22:10 KST (= 13:10 UTC) — 2차: 최신 예보로 갱신
    - cron: '10 21 * * *'   # 06:10 KST (= 21:10 UTC 전날) — 3차: 당일 아침 최종 갱신
  workflow_dispatch:        # 수동 실행 — 선택 없이 항상 한국시간 기준 다음날 포스터 생성

permissions:
  contents: write

concurrency:
  group: repo-commit
  cancel-in-progress: false

jobs:
  forecast-poster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -fv
      - run: npm install canvas
      - name: 예보 포스터 생성
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
          AREA_NO: '1120079000'
          POSTER_TYPE: 'forecast'
          FORECAST_DAY: 'tomorrow'
        run: node scripts/generate-poster.js
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "🌅 예보 포스터: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase --autostash || true
            git push
          fi
