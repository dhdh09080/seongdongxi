name: 예보 포스터 (22시)

on:
  schedule:
    - cron: '0 13 * * *'   # 22:00 KST (= 13:00 UTC) — 자동 실행 시 '내일' 예보
  workflow_dispatch:
    inputs:
      forecast_day:
        description: '어느 날짜 예보를 뽑을까요?'
        required: true
        default: 'tomorrow'
        type: choice
        options:
          - tomorrow
          - today

permissions:
  contents: write

concurrency:
  group: repo-commit
  cancel-in-progress: false

jobs:
  forecast-poster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -fv
      - run: npm install canvas
      - name: 예보 포스터 생성
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
          POSTER_TYPE: 'forecast'
          # 수동 실행 시 선택값 사용, 자동(스케줄) 실행 시 기본 'tomorrow'
          FORECAST_DAY: ${{ github.event.inputs.forecast_day || 'tomorrow' }}
        run: node scripts/generate-poster.js
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "🌅 예보 포스터: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase --autostash || true
            git push
          fi
