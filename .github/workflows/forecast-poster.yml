name: 내일 예보 포스터 (22시)

on:
  schedule:
    - cron: '0 13 * * *'   # 22:00 KST (= 13:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forecast-poster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -fv
      - run: npm install canvas
      - name: 내일 예보 포스터 생성
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
          POSTER_TYPE: 'forecast'
          IS_TEST: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: node scripts/generate-poster.js
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --staged --quiet || git commit -m "🌅 내일 예보 포스터: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
