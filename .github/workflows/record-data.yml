name: 체감온도 엑셀 기록 (매시간)

on:
  schedule:
    # KST 06~17시 매시간, 매시 45분 실행 (실황은 매시 40분 이후 제공되므로)
    # KST 06~17시 → UTC 21,22,23,0,1,2,3,4,5,6,7,8시
    - cron: '45 21,22,23,0,1,2,3,4,5,6,7,8 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 다른 워크플로우와 push가 겹쳐도 안전하도록 동시 실행 제한
concurrency:
  group: repo-commit
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install exceljs
      - name: 현재 시각 실황 기록
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GRID_NX: '61'
          GRID_NY: '127'
          AREA_NO: '1120079000'
        run: node scripts/record-data.js
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "📊 체감온도 기록: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase --autostash || true
            git push
          fi
